<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" data-diagram-type="CLASS" style="width:790px;height:491px;background:#FFFFFF;" width="790px" height="491px" viewBox="0 0 790 491" zoomAndPan="magnify" preserveAspectRatio="none" contentStyleType="text/css"><?plantuml 1.2026.7beta3?><defs/><g><g class="legend" data-source-line="1"><rect x="12" y="22" width="759.376" height="450.0156" fill="#DDDDDD" style="stroke:#000000;stroke-width:1;" rx="7.5" ry="7.5"/><text x="17" y="39.9951" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="399.3008" font-family="sans-serif">The plugin you are using seems to generated a bad URL.</text><text x="17" y="56.292" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="295.8867" font-family="sans-serif">This URL does not look like DEFLATE data.</text><text x="17" y="72.5889" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="367.6641" font-family="sans-serif">It looks like your plugin is using HUFFMAN encoding.</text><text x="17" y="88.8857" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="4.4502" font-family="sans-serif"> </text><text x="17" y="105.1826" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="671.7061" font-family="sans-serif">This means you have now to add an header ~1 to your data. For example, you have to change:</text><text x="17" y="121.4795" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="554.791" font-family="sans-serif">http://www.plantuml.com/plantuml/png/UDg5LDjg6p4GVT-l65meDiHjOWAz-A...</text><text x="17" y="137.7764" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="14.0547" font-family="sans-serif">to</text><text x="17" y="154.0732" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="575.4287" font-family="sans-serif">http://www.plantuml.com/plantuml/png/~1UDg5LDjg6p4GVT-l65meDiHjOWAz-A...</text><text x="17" y="170.3701" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="4.4502" font-family="sans-serif"> </text><text x="17" y="186.667" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="138.2773" font-family="sans-serif">It will work this way</text><text x="17" y="202.9639" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="428.1484" font-family="sans-serif">You may contact the PlantUML team at plantuml@gmail.com</text><text x="17" y="219.2607" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="749.376" font-family="sans-serif">But you should also probably contact the plugin authors you are currently using and send them this image</text><text x="17" y="235.5576" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="4.4502" font-family="sans-serif"> </text><text x="17" y="251.8545" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="232.5449" font-family="sans-serif">For the record, here is your data:</text><text x="17" y="268.1514" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="4.4502" font-family="sans-serif"> </text><text x="17" y="284.4482" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="663.5166" font-family="sans-serif">UDg5LDjg6p4GVT-l65meDiHjOWAz-A6n7RiG9o74AJIGb_6kl3lLpUZIaB_lQ2_kjabQORpIwcXcpfcZ</text><text x="17" y="300.7451" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="721.2393" font-family="sans-serif">FVC1NOXQGVJ2ZNVAFexBA7mOvvN8fOqXyvBC7Xrgs8Gd9S07Htawqjiv5pkCAgoi2TUe1GnkLFHmWPA3</text><text x="17" y="317.042" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="663.9473" font-family="sans-serif">8spG-44FFSi3_QJmDCTSbiv6KooiiWxUh3wiJfVpbv3M5SArgEF9P36Pl81AwL_5E6SVsysJu_cdZoT_</text><text x="17" y="333.3389" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="690.1426" font-family="sans-serif">4ECwNzjS7ifRhavvz6aJQckA__FeWF-aqOAUiyW21HR-v1ryuoR1Yfi4OxX37K4AMBIDWasKNdWOVatz</text><text x="17" y="349.6357" fill="#000000" font-size="14" lengthAdjus