<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" data-diagram-type="CLASS" style="width:790px;height:539px;background:#FFFFFF;" width="790px" height="539px" viewBox="0 0 790 539" zoomAndPan="magnify" preserveAspectRatio="none" contentStyleType="text/css"><?plantuml 1.2026.7beta3?><defs/><g><g class="legend" data-source-line="1"><rect x="12" y="22" width="759.376" height="498.9063" fill="#DDDDDD" style="stroke:#000000;stroke-width:1;" rx="7.5" ry="7.5"/><text x="17" y="39.9951" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="399.3008" font-family="sans-serif">The plugin you are using seems to generated a bad URL.</text><text x="17" y="56.292" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="295.8867" font-family="sans-serif">This URL does not look like DEFLATE data.</text><text x="17" y="72.5889" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="367.6641" font-family="sans-serif">It looks like your plugin is using HUFFMAN encoding.</text><text x="17" y="88.8857" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="4.4502" font-family="sans-serif"> </text><text x="17" y="105.1826" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="671.7061" font-family="sans-serif">This means you have now to add an header ~1 to your data. For example, you have to change:</text><text x="17" y="121.4795" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="551.1611" font-family="sans-serif">http://www.plantuml.com/plantuml/png/UDgLLUzl6ZaG_Rv_nOYJoYA5q4Qd-u...</text><text x="17" y="137.7764" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="14.0547" font-family="sans-serif">to</text><text x="17" y="154.0732" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="571.7988" font-family="sans-serif">http://www.plantuml.com/plantuml/png/~1UDgLLUzl6ZaG_Rv_nOYJoYA5q4Qd-u...</text><text x="17" y="170.3701" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="4.4502" font-family="sans-serif"> </text><text x="17" y="186.667" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="138.2773" font-family="sans-serif">It will work this way</text><text x="17" y="202.9639" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="428.1484" font-family="sans-serif">You may contact the PlantUML team at plantuml@gmail.com</text><text x="17" y="219.2607" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="749.376" font-family="sans-serif">But you should also probably contact the plugin authors you are currently using and send them this image</text><text x="17" y="235.5576" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="4.4502" font-family="sans-serif"> </text><text x="17" y="251.8545" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="232.5449" font-family="sans-serif">For the record, here is your data:</text><text x="17" y="268.1514" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="4.4502" font-family="sans-serif"> </text><text x="17" y="284.4482" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="655.9014" font-family="sans-serif">UDgLLUzl6ZaG_Rv_nOYJoYA5q4Qd-u6KgY4aqfqk2GNIJoVHOJq5Txtsdkqz59twltTiBs63Ik-E3x1h</text><text x="17" y="300.7451" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="695.167" font-family="sans-serif">Zz-yUNupl7CUhMyg1Ox-QaWND3HMa1tokc_SiAa5UigmyKOtrPfivagfQxHOmS8_AGBdhIm2GcTdIf-m</text><text x="17" y="317.042" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="697.3818" font-family="sans-serif">KVxMQ7-F5K5lfXe7lsF9kH0Mg5sl4ptZLLd86hMVO55kh6cqk3RAMFZXzkVR7syc9u8ZqpRmzSN5zSL5</text><text x="17" y="333.3389" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="687.5449" font-family="sans-serif">9_2gyCR-EruA-pwIjMRNRhvvFVdrbpTPvgNdsdywXqKh6qmbRaBq46QaDwICGjIiKP2Hbnngr5c68Htq</text><text x="17" y="349.6357" fill="#000000" font-size="14" lengthAdjus