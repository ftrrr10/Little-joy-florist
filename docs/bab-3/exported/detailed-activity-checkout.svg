<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" data-diagram-type="CLASS" style="width:790px;height:556px;background:#FFFFFF;" width="790px" height="556px" viewBox="0 0 790 556" zoomAndPan="magnify" preserveAspectRatio="none" contentStyleType="text/css"><?plantuml 1.2026.7beta3?><defs/><g><g class="legend" data-source-line="1"><rect x="12" y="22" width="759.376" height="515.2031" fill="#DDDDDD" style="stroke:#000000;stroke-width:1;" rx="7.5" ry="7.5"/><text x="17" y="39.9951" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="399.3008" font-family="sans-serif">The plugin you are using seems to generated a bad URL.</text><text x="17" y="56.292" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="295.8867" font-family="sans-serif">This URL does not look like DEFLATE data.</text><text x="17" y="72.5889" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="367.6641" font-family="sans-serif">It looks like your plugin is using HUFFMAN encoding.</text><text x="17" y="88.8857" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="4.4502" font-family="sans-serif"> </text><text x="17" y="105.1826" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="671.7061" font-family="sans-serif">This means you have now to add an header ~1 to your data. For example, you have to change:</text><text x="17" y="121.4795" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="553.2324" font-family="sans-serif">http://www.plantuml.com/plantuml/png/UDg5LUzl6ZaG_Rv_nOYJhj23YgBUhw...</text><text x="17" y="137.7764" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="14.0547" font-family="sans-serif">to</text><text x="17" y="154.0732" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="573.8701" font-family="sans-serif">http://www.plantuml.com/plantuml/png/~1UDg5LUzl6ZaG_Rv_nOYJhj23YgBUhw...</text><text x="17" y="170.3701" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="4.4502" font-family="sans-serif"> </text><text x="17" y="186.667" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="138.2773" font-family="sans-serif">It will work this way</text><text x="17" y="202.9639" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="428.1484" font-family="sans-serif">You may contact the PlantUML team at plantuml@gmail.com</text><text x="17" y="219.2607" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="749.376" font-family="sans-serif">But you should also probably contact the plugin authors you are currently using and send them this image</text><text x="17" y="235.5576" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="4.4502" font-family="sans-serif"> </text><text x="17" y="251.8545" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="232.5449" font-family="sans-serif">For the record, here is your data:</text><text x="17" y="268.1514" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="4.4502" font-family="sans-serif"> </text><text x="17" y="284.4482" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="700.957" font-family="sans-serif">UDg5LUzl6ZaG_Rv_nOYJhj23YgBUhw3JDGdXGqbwqIMLhbAbCCkQNSTUUsMF4o7bZ-_O60ffUzqFaEnu</text><text x="17" y="300.7451" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="696.9854" font-family="sans-serif">PjwyzyQyzOIEGgkX4eHIYsg4Av8FaZQZLIDMoWOgl9AcGuSjtD162_3av2ec7KHcOer1qzmQUe-jWDwr</text><text x="17" y="317.042" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="652.7773" font-family="sans-serif">3XxUeUBo23TeVE_Wz6dkSOOhLJiRJ7LkjNNmq_pt-PkBis-TjAuIBfyQJoRdayatJiNstptZd7tCmTVZ</text><text x="17" y="333.3389" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="650.4941" font-family="sans-serif">ip__U7qq6EFyNl1Y3-zY_eQVmx4bjjPKFvvZT_1_nyY7lfwY84bC_6-luf4wJQFInEYP-IWSZE3QMIyy</text><text x="17" y="349.6357" fill="#000000" font-size="14" lengthAdjus